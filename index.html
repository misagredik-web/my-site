<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>P1NQ Arena Calculator</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Montserrat:wght@400;600&display=swap');

      :root {
        --bg: #0b0d10;
        --bg-2: #0f1319;
        --panel: #121823;
        --panel-2: #0f141d;
        --text: #e8edf5;
        --muted: #9aa5b1;
        --line: #1f2835;
        --accent: #ff5500;
        --accent-2: #ff8a00;
        --good: #22c55e;
      }

      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
      body {
        font-family: 'Rajdhani', 'Montserrat', sans-serif;
        color: var(--text);
        background: linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 60%, var(--bg) 100%);
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: url('bg.jpg') center center / cover no-repeat;
        opacity: 0.12;
        filter: grayscale(1) contrast(1.1);
        pointer-events: none;
        z-index: -2;
      }

      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(1200px 700px at 10% 10%, rgba(255, 85, 0, 0.15), transparent 60%),
          radial-gradient(900px 600px at 90% 20%, rgba(255, 140, 0, 0.12), transparent 60%),
          linear-gradient(120deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 40%);
        pointer-events: none;
        z-index: -1;
      }

      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 28px clamp(20px, 4vw, 64px) 48px;
        gap: 36px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .brand-mark {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        background: linear-gradient(140deg, var(--accent), var(--accent-2));
        color: #111;
        font-weight: 700;
        border-radius: 8px;
        transform: skewX(-10deg);
      }

      .nav {
        display: flex;
        gap: 18px;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .cta {
        border: none;
        background: linear-gradient(140deg, var(--accent), var(--accent-2));
        color: #111;
        padding: 10px 18px;
        border-radius: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        cursor: pointer;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(240px, 1.2fr) minmax(280px, 0.8fr);
        gap: clamp(24px, 4vw, 64px);
        align-items: center;
      }

      .kicker {
        text-transform: uppercase;
        letter-spacing: 0.24em;
        color: var(--accent);
        font-size: 12px;
        margin-bottom: 12px;
      }

      h1 {
        font-size: clamp(32px, 5vw, 56px);
        margin: 0 0 16px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .lead {
        font-family: 'Montserrat', sans-serif;
        font-size: 16px;
        line-height: 1.6;
        color: var(--muted);
        max-width: 520px;
        margin-bottom: 24px;
      }

      .stats {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
      }

      .stat {
        background: rgba(18, 24, 35, 0.8);
        border: 1px solid var(--line);
        padding: 12px 16px;
        border-radius: 12px;
        min-width: 120px;
      }

      .stat span {
        display: block;
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
      }

      .stat small {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .panel {
        background: linear-gradient(140deg, rgba(18, 24, 35, 0.95), rgba(12, 16, 24, 0.95));
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        position: relative;
        overflow: hidden;
      }

      .panel::before {
        content: '';
        position: absolute;
        top: -40px;
        right: -60px;
        width: 140px;
        height: 140px;
        background: linear-gradient(140deg, rgba(255, 85, 0, 0.35), transparent);
        transform: rotate(20deg);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .panel-title {
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: 12px;
        color: var(--muted);
      }

      .badge {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #111;
        background: var(--accent);
        padding: 4px 8px;
        border-radius: 6px;
        font-weight: 700;
      }

      .calc {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .display {
        width: 100%;
        height: 56px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 22px;
        text-align: right;
        background: rgba(8, 12, 18, 0.9);
        color: var(--text);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        height: 50px;
        border: 1px solid transparent;
        border-radius: 12px;
        font-size: 18px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        transition: transform 0.08s ease, border 0.2s ease;
      }

      button:hover { border-color: rgba(255, 255, 255, 0.15); }
      button:active { transform: translateY(1px); }
      button.operator { background: rgba(255, 85, 0, 0.12); }
      button.equal {
        background: linear-gradient(140deg, var(--accent), var(--accent-2));
        color: #111;
        font-weight: 700;
        grid-column: span 2;
      }
      button.clear { background: rgba(239, 68, 68, 0.2); }
      button.back { background: rgba(250, 204, 21, 0.2); }

      .hint {
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 900px) {
        .hero { grid-template-columns: 1fr; }
        .topbar { flex-wrap: wrap; }
        .nav { order: 3; width: 100%; justify-content: center; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">P</div>
          P1NQ ARENA
        </div>
        <nav class="nav">
          <span>Matches</span>
          <span>Ladders</span>
          <span>Hub</span>
        </nav>
        <button class="cta">Join</button>
      </header>

      <main class="hero">
        <section>
          <div class="kicker">Fast. Focused. Competitive.</div>
          <h1>Калькулятор в стиле Faceit</h1>
          <p class="lead">
            Темный кибер-стиль, оранжевые акценты и четкая геометрия. Ниже полноценный
            калькулятор для быстрых расчетов прямо на странице.
          </p>
          <div class="stats">
            <div class="stat"><span>4.9</span><small>Rating</small></div>
            <div class="stat"><span>120</span><small>Matches</small></div>
            <div class="stat"><span>24/7</span><small>Online</small></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Live Calculator</div>
            <div class="badge">Live</div>
          </div>
          <div class="calc">
            <input id="display" class="display" type="text" readonly value="" placeholder="0" />
            <div class="grid">
              <button class="clear" data-action="clear">C</button>
              <button class="back" data-action="back">⌫</button>
              <button class="operator" data-value="(">(</button>
              <button class="operator" data-value=")">)</button>

              <button data-value="7">7</button>
              <button data-value="8">8</button>
              <button data-value="9">9</button>
              <button class="operator" data-value="/">÷</button>

              <button data-value="4">4</button>
              <button data-value="5">5</button>
              <button data-value="6">6</button>
              <button class="operator" data-value="*">×</button>

              <button data-value="1">1</button>
              <button data-value="2">2</button>
              <button data-value="3">3</button>
              <button class="operator" data-value="-">−</button>

              <button data-value="0">0</button>
              <button data-value=".">.</button>
              <button class="operator" data-value="+">+</button>
              <button class="equal" data-action="equal">=</button>
            </div>
            <div class="hint">Можно вводить с клавиатуры</div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const display = document.getElementById('display');
      const buttons = document.querySelectorAll('button');

      function appendValue(val) {
        display.value += val;
      }

      function clearAll() {
        display.value = '';
      }

      function backspace() {
        display.value = display.value.slice(0, -1);
      }

      function isSafeExpression(expr) {
        return /^[0-9+\-*/().\s]+$/.test(expr);
      }

      function evaluate() {
        const expr = display.value.trim();
        if (!expr) return;
        if (!isSafeExpression(expr)) {
          display.value = 'Ошибка';
          return;
        }
        try {
          const result = Function('"use strict"; return (' + expr + ')')();
          if (!Number.isFinite(result)) {
            display.value = 'Ошибка';
            return;
          }
          display.value = String(result);
        } catch {
          display.value = 'Ошибка';
        }
      }

      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          const action = btn.getAttribute('data-action');
          const value = btn.getAttribute('data-value');
          if (action === 'clear') return clearAll();
          if (action === 'back') return backspace();
          if (action === 'equal') return evaluate();
          if (value) return appendValue(value);
        });
      });

      document.addEventListener('keydown', (e) => {
        const allowed = '0123456789+-*/().';
        if (allowed.includes(e.key)) {
          appendValue(e.key);
        } else if (e.key === 'Enter') {
          evaluate();
        } else if (e.key === 'Backspace') {
          backspace();
        } else if (e.key === 'Escape') {
          clearAll();
        }
      });
    </script>
  </body>
</html>
