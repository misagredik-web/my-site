<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Калькулятор</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
      body {
        background: #000 url("bg.jpg") center center / contain no-repeat;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.25);
      }
      .calc {
        width: 320px;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 18px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        padding: 16px;
        backdrop-filter: blur(6px);
      }
      .display {
        width: 100%;
        height: 54px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 22px;
        text-align: right;
        box-sizing: border-box;
        background: #f8fafc;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-top: 14px;
      }
      button {
        height: 52px;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        cursor: pointer;
        background: #f1f5f9;
      }
      button.operator { background: #e0f2fe; }
      button.equal { background: #22c55e; color: #fff; grid-column: span 2; }
      button.clear { background: #fee2e2; }
      button.back { background: #fde68a; }
      .small { font-size: 14px; color: #475569; margin-top: 8px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div class="calc">
        <input id="display" class="display" type="text" readonly value="" placeholder="0" />
        <div class="grid">
          <button class="clear" data-action="clear">C</button>
          <button class="back" data-action="back">⌫</button>
          <button class="operator" data-value="(">(</button>
          <button class="operator" data-value=")">)</button>

          <button data-value="7">7</button>
          <button data-value="8">8</button>
          <button data-value="9">9</button>
          <button class="operator" data-value="/">÷</button>

          <button data-value="4">4</button>
          <button data-value="5">5</button>
          <button data-value="6">6</button>
          <button class="operator" data-value="*">×</button>

          <button data-value="1">1</button>
          <button data-value="2">2</button>
          <button data-value="3">3</button>
          <button class="operator" data-value="-">−</button>

          <button data-value="0">0</button>
          <button data-value=".">.</button>
          <button class="operator" data-value="+">+</button>
          <button class="equal" data-action="equal">=</button>
        </div>
        <div class="small">Можно вводить с клавиатуры</div>
      </div>
    </div>

    <script>
      const display = document.getElementById('display');
      const buttons = document.querySelectorAll('button');

      function appendValue(val) {
        display.value += val;
      }

      function clearAll() {
        display.value = '';
      }

      function backspace() {
        display.value = display.value.slice(0, -1);
      }

      function isSafeExpression(expr) {
        return /^[0-9+\-*/().\s]+$/.test(expr);
      }

      function evaluate() {
        const expr = display.value.trim();
        if (!expr) return;
        if (!isSafeExpression(expr)) {
          display.value = 'Ошибка';
          return;
        }
        try {
          // eslint-disable-next-line no-new-func
          const result = Function('"use strict"; return (' + expr + ')')();
          if (!Number.isFinite(result)) {
            display.value = 'Ошибка';
            return;
          }
          display.value = String(result);
        } catch {
          display.value = 'Ошибка';
        }
      }

      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          const action = btn.getAttribute('data-action');
          const value = btn.getAttribute('data-value');
          if (action === 'clear') return clearAll();
          if (action === 'back') return backspace();
          if (action === 'equal') return evaluate();
          if (value) return appendValue(value);
        });
      });

      document.addEventListener('keydown', (e) => {
        const allowed = '0123456789+-*/().';
        if (allowed.includes(e.key)) {
          appendValue(e.key);
        } else if (e.key === 'Enter') {
          evaluate();
        } else if (e.key === 'Backspace') {
          backspace();
        } else if (e.key === 'Escape') {
          clearAll();
        }
      });
    </script>
  </body>
</html>
